<svg viewBox="0 0 1240 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowfb" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#fbbf24"/>
    </marker>
    <style>
      .title { font-size: 15px; font-weight: 700; }
      .sub   { font-size: 10.5px; font-weight: 400; }
      .mono  { font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; }
      .lg    { font-size: 11px; font-weight: 500; fill: #cbd5e1; }
      .hd    { font-size: 12px; font-weight: 600; fill: #64748b; letter-spacing: .04em; }
    </style>
  </defs>

  <rect x="4" y="4" width="1232" height="352" rx="14" fill="#0b0f1a" stroke="#1e293b"/>

  <text x="24" y="40" class="hd">CLOSED-LOOP FLIGHT-SIM PIPELINE</text>

  <!-- legend -->
  <circle cx="466" cy="36" r="5" fill="#1f2937" stroke="#94a3b8"/><text x="478" y="40" class="lg">state</text>
  <circle cx="560" cy="36" r="5" fill="#0e2a47" stroke="#3b82f6"/><text x="572" y="40" class="lg">estimation</text>
  <circle cx="688" cy="36" r="5" fill="#3a2410" stroke="#f59e0b"/><text x="700" y="40" class="lg">control</text>
  <circle cx="788" cy="36" r="5" fill="#0d331f" stroke="#22c55e"/><text x="800" y="40" class="lg">plant</text>

  <!-- forward arrows -->
  <line x1="172" y1="130" x2="186" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="340" y1="130" x2="354" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="508" y1="130" x2="522" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="676" y1="130" x2="690" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="844" y1="130" x2="858" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1012" y1="130" x2="1026" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- feedback loop -->
  <path d="M 1103 180 V 312 Q 1103 322 1093 322 H 105 Q 95 322 95 312 V 186"
        fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowfb)"/>
  <text x="599" y="316" text-anchor="middle" class="sub" fill="#fcd34d">truth&#8242; &#8212; closed loop @ 1 kHz</text>

  <!-- truth -->
  <rect x="20" y="80" width="150" height="100" rx="10" fill="#1f2937" stroke="#94a3b8"/>
  <text x="95" y="116" text-anchor="middle" class="title" fill="#f1f5f9">truth</text>
  <text x="95" y="138" text-anchor="middle" class="sub mono" fill="#cbd5e1">x &#183; q &#183; v &#183; &#969;</text>

  <!-- SENSORS -->
  <rect x="188" y="80" width="150" height="100" rx="10" fill="#0e2a47" stroke="#3b82f6"/>
  <text x="263" y="110" text-anchor="middle" class="title" fill="#dbeafe">SENSORS</text>
  <text x="263" y="131" text-anchor="middle" class="sub" fill="#93c5fd">IMU &#183; GPS</text>
  <text x="263" y="147" text-anchor="middle" class="sub" fill="#93c5fd">baro &#183; mag</text>

  <!-- ESTIMATOR -->
  <rect x="356" y="80" width="150" height="100" rx="10" fill="#0e2a47" stroke="#3b82f6"/>
  <text x="431" y="106" text-anchor="middle" class="title" fill="#dbeafe">ESTIMATOR</text>
  <text x="431" y="124" text-anchor="middle" class="sub" fill="#93c5fd">complementary</text>
  <text x="431" y="139" text-anchor="middle" class="sub" fill="#93c5fd">quaternion MEKF</text>
  <text x="431" y="154" text-anchor="middle" class="sub" fill="#93c5fd">15-state INS</text>

  <!-- CONTROLLER -->
  <rect x="524" y="80" width="150" height="100" rx="10" fill="#3a2410" stroke="#f59e0b"/>
  <text x="599" y="110" text-anchor="middle" class="title" fill="#fde68a">CONTROLLER</text>
  <text x="599" y="131" text-anchor="middle" class="sub" fill="#fcd34d">cascaded PID / LQR</text>
  <text x="599" y="147" text-anchor="middle" class="sub" fill="#fcd34d">position + waypoints</text>

  <!-- MIXER + MOTORS -->
  <rect x="692" y="80" width="150" height="100" rx="10" fill="#3a2410" stroke="#f59e0b"/>
  <text x="767" y="110" text-anchor="middle" class="title" fill="#fde68a">MIXER + MOTORS</text>
  <text x="767" y="131" text-anchor="middle" class="sub" fill="#fcd34d">X-mixer</text>
  <text x="767" y="147" text-anchor="middle" class="sub" fill="#fcd34d">motor lag</text>

  <!-- DYNAMICS -->
  <rect x="860" y="80" width="150" height="100" rx="10" fill="#0d331f" stroke="#22c55e"/>
  <text x="935" y="116" text-anchor="middle" class="title" fill="#bbf7d0">DYNAMICS</text>
  <text x="935" y="138" text-anchor="middle" class="sub" fill="#86efac">Newton-Euler EOM</text>

  <!-- RK4 -->
  <rect x="1028" y="80" width="150" height="100" rx="10" fill="#0d331f" stroke="#22c55e"/>
  <text x="1103" y="116" text-anchor="middle" class="title" fill="#bbf7d0">RK4</text>
  <text x="1103" y="138" text-anchor="middle" class="sub" fill="#86efac">1 kHz integration</text>
</svg>